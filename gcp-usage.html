<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GCP Usage Showcase | VolunteerBridge</title>
  <style>
    :root {
      --primary: #10b981;
      --bg: #0f172a;
      --card-bg: #1e293b;
      --text: #f8fafc;
      --text-muted: #94a3b8;
    }
    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      padding: 2rem;
    }
    .card {
      background: var(--card-bg);
      padding: 3rem;
      border-radius: 1.5rem;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
      max-width: 600px;
      width: 100%;
      text-align: center;
      border: 1px solid rgba(255, 255, 255, 0.1);
    }
    h1 {
      font-size: 2.5rem;
      margin-bottom: 1rem;
      background: linear-gradient(to right, #10b981, #3b82f6);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    p {
      color: var(--text-muted);
      margin-bottom: 2rem;
      font-size: 1.1rem;
    }
    #output {
      text-align: left;
      background: #020617;
      padding: 1.5rem;
      border-radius: 0.75rem;
      font-family: 'Fira Code', monospace;
      font-size: 0.85rem;
      overflow-y: auto;
      max-height: 300px;
      border: 1px solid rgba(255, 255, 255, 0.05);
    }
    .log-entry {
      margin-bottom: 0.5rem;
      border-bottom: 1px solid rgba(255, 255, 255, 0.05);
      padding-bottom: 0.25rem;
    }
    .log-success { color: #4ade80; }
    .log-info { color: #60a5fa; }
    .log-error { color: #f87171; }
    .status-badge {
      display: inline-block;
      padding: 0.25rem 0.75rem;
      border-radius: 99px;
      font-size: 0.75rem;
      font-weight: 700;
      background: rgba(16, 185, 129, 0.1);
      color: var(--primary);
      margin-bottom: 1rem;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="status-badge">THIS IS GCP USAGE 🔥</div>
    <h1>Firebase Firestore Sync</h1>
    <p>Real-time synchronization between NGO requirements and community resources.</p>
    
    <div id="output">
      <div class="log-entry log-info">System initializing...</div>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
    import { getFirestore, collection, addDoc, getDocs } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";
    import { firebaseConfig } from "./firebase-config.js";

    const output = document.getElementById('output');

    function log(msg, type = 'info') {
      const div = document.createElement('div');
      div.className = `log-entry log-${type}`;
      div.textContent = `[${new Date().toLocaleTimeString()}] ${msg}`;
      output.appendChild(div);
      output.scrollTop = output.scrollHeight;
    }

    try {
      // Initialize Firebase
      const app = initializeApp(firebaseConfig);
      log("Firebase app initialized.", "success");

      // Initialize Firestore (THIS IS GCP USAGE 🔥)
      const db = getFirestore(app);
      log("Firestore engine ready.", "success");

      // ✅ Example: Add NGO Requirement
      async function addRequirement() {
        try {
          log("Drafting new requirement document...");
          const docRef = await addDoc(collection(db, "requirements"), {
            title: "Need Doctor",
            urgency: "High",
            location: "Mumbai",
            timestamp: new Date()
          });
          log("Document written with ID: " + docRef.id, "success");
        } catch (e) {
          log("Error adding document: " + e.message, "error");
        }
      }

      // ✅ Example: Fetch Data
      async function getRequirements() {
        try {
          log("Fetching active requirements...");
          const querySnapshot = await getDocs(collection(db, "requirements"));
          if (querySnapshot.empty) {
            log("No requirements found.");
          }
          querySnapshot.forEach((doc) => {
            log(`ID: ${doc.id} | Data: ${JSON.stringify(doc.data())}`);
          });
        } catch (e) {
          log("Error fetching requirements: " + e.message, "error");
        }
      }

      // Execution
      (async () => {
        await addRequirement();
        await getRequirements();
      })();

    } catch (err) {
      log("Critical Initialization Error: " + err.message, "error");
    }

  </script>
</body>
</html>
